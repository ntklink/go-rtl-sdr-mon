name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: amd64
            platform: linux/amd64
          - target: arm64
            platform: linux/arm64
          - target: arm
            platform: linux/arm/v7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build binary
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: export
          platforms: ${{ matrix.platform }}
          outputs: type=local,dest=./out
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Rename binary
        run: |
          mv ./out/go-rtl-sdr-mon ./go-rtl-sdr-mon-linux-${{ matrix.target }}
          chmod +x ./go-rtl-sdr-mon-linux-${{ matrix.target }}

      - name: Create tarball
        run: tar czf go-rtl-sdr-mon-linux-${{ matrix.target }}.tar.gz go-rtl-sdr-mon-linux-${{ matrix.target }}

      - name: Generate checksum
        run: sha256sum go-rtl-sdr-mon-linux-${{ matrix.target }}.tar.gz > go-rtl-sdr-mon-linux-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-rtl-sdr-mon-linux-${{ matrix.target }}
          path: |
            go-rtl-sdr-mon-linux-${{ matrix.target }}.tar.gz
            go-rtl-sdr-mon-linux-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./assets
          merge-multiple: true
          pattern: go-rtl-sdr-mon-linux-*

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            assets/*.tar.gz
            assets/*.sha256
